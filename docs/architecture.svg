<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="640" viewBox="0 0 1000 640" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1000" height="640" fill="#ffffff"/>
  <text x="500" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0e1116">Atomberg Video Support — System Architecture</text>
  <text x="500" y="58" text-anchor="middle" font-size="13" fill="#5b6573">Media routes through our own server (SFU). No peer-to-peer. No third-party video API.</text>

  <!-- Agent browser -->
  <g>
    <rect x="40" y="120" width="220" height="180" rx="12" fill="#eef4ff" stroke="#4f8cff" stroke-width="2"/>
    <text x="150" y="148" text-anchor="middle" font-size="15" font-weight="700" fill="#1b3a7a">Agent browser</text>
    <rect x="60" y="166" width="180" height="34" rx="7" fill="#fff" stroke="#cdd9ee"/>
    <text x="150" y="188" text-anchor="middle" font-size="12" fill="#23324a">getUserMedia (cam + mic)</text>
    <rect x="60" y="208" width="180" height="34" rx="7" fill="#fff" stroke="#cdd9ee"/>
    <text x="150" y="230" text-anchor="middle" font-size="12" fill="#23324a">RTCPeerConnection → server</text>
    <rect x="60" y="250" width="180" height="34" rx="7" fill="#fff" stroke="#cdd9ee"/>
    <text x="150" y="272" text-anchor="middle" font-size="12" fill="#23324a">Socket.IO client</text>
  </g>

  <!-- Customer browser -->
  <g>
    <rect x="740" y="120" width="220" height="180" rx="12" fill="#eef4ff" stroke="#4f8cff" stroke-width="2"/>
    <text x="850" y="148" text-anchor="middle" font-size="15" font-weight="700" fill="#1b3a7a">Customer browser</text>
    <rect x="760" y="166" width="180" height="34" rx="7" fill="#fff" stroke="#cdd9ee"/>
    <text x="850" y="188" text-anchor="middle" font-size="12" fill="#23324a">getUserMedia (cam + mic)</text>
    <rect x="760" y="208" width="180" height="34" rx="7" fill="#fff" stroke="#cdd9ee"/>
    <text x="850" y="230" text-anchor="middle" font-size="12" fill="#23324a">RTCPeerConnection → server</text>
    <rect x="760" y="250" width="180" height="34" rx="7" fill="#fff" stroke="#cdd9ee"/>
    <text x="850" y="272" text-anchor="middle" font-size="12" fill="#23324a">Socket.IO client</text>
  </g>

  <!-- Server -->
  <g>
    <rect x="300" y="110" width="400" height="320" rx="14" fill="#f4f6fb" stroke="#2a3140" stroke-width="2"/>
    <text x="500" y="135" text-anchor="middle" font-size="15" font-weight="700" fill="#0e1116">Node.js server (single process)</text>

    <rect x="325" y="152" width="160" height="40" rx="8" fill="#fff" stroke="#9aa7b4"/>
    <text x="405" y="170" text-anchor="middle" font-size="12" font-weight="600" fill="#0e1116">Express REST</text>
    <text x="405" y="185" text-anchor="middle" font-size="10" fill="#5b6573">auth · sessions · files · admin</text>

    <rect x="515" y="152" width="160" height="40" rx="8" fill="#fff" stroke="#9aa7b4"/>
    <text x="595" y="170" text-anchor="middle" font-size="12" font-weight="600" fill="#0e1116">Socket.IO</text>
    <text x="595" y="185" text-anchor="middle" font-size="10" fill="#5b6573">signaling · chat · presence</text>

    <rect x="325" y="206" width="350" height="56" rx="8" fill="#fff5e6" stroke="#d29922" stroke-width="2"/>
    <text x="500" y="228" text-anchor="middle" font-size="13" font-weight="700" fill="#8a5d00">werift SFU — forwards RTP A ↔ B</text>
    <text x="500" y="247" text-anchor="middle" font-size="10" fill="#8a5d00">relay tracks · renegotiation · PLI keyframes</text>

    <rect x="325" y="276" width="160" height="40" rx="8" fill="#fff" stroke="#9aa7b4"/>
    <text x="405" y="294" text-anchor="middle" font-size="12" font-weight="600" fill="#0e1116">Recorder</text>
    <text x="405" y="309" text-anchor="middle" font-size="10" fill="#5b6573">werift → WebM</text>

    <rect x="515" y="276" width="160" height="40" rx="8" fill="#fff" stroke="#9aa7b4"/>
    <text x="595" y="294" text-anchor="middle" font-size="12" font-weight="600" fill="#0e1116">/metrics</text>
    <text x="595" y="309" text-anchor="middle" font-size="10" fill="#5b6573">Prometheus</text>

    <rect x="360" y="334" width="280" height="74" rx="8" fill="#eafaf0" stroke="#2ea043" stroke-width="2"/>
    <text x="500" y="356" text-anchor="middle" font-size="12" font-weight="700" fill="#1a6b2e">node:sqlite (built-in)</text>
    <text x="500" y="374" text-anchor="middle" font-size="10" fill="#1a6b2e">sessions · participants · messages</text>
    <text x="500" y="389" text-anchor="middle" font-size="10" fill="#1a6b2e">files · events · recordings</text>
  </g>

  <!-- Media arrows (through server) -->
  <defs>
    <marker id="amber" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#d29922"/></marker>
    <marker id="blue" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#4f8cff"/></marker>
  </defs>

  <line x1="260" y1="220" x2="322" y2="228" stroke="#d29922" stroke-width="3" marker-end="url(#amber)"/>
  <line x1="322" y1="240" x2="260" y2="250" stroke="#d29922" stroke-width="3" marker-end="url(#amber)"/>
  <line x1="740" y1="220" x2="678" y2="228" stroke="#d29922" stroke-width="3" marker-end="url(#amber)"/>
  <line x1="678" y1="240" x2="740" y2="250" stroke="#d29922" stroke-width="3" marker-end="url(#amber)"/>
  <text x="280" y="200" font-size="10" fill="#8a5d00">media (SRTP)</text>
  <text x="690" y="200" font-size="10" fill="#8a5d00">media (SRTP)</text>

  <!-- Signaling arrows -->
  <line x1="260" y1="272" x2="513" y2="180" stroke="#4f8cff" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#blue)"/>
  <line x1="740" y1="272" x2="677" y2="180" stroke="#4f8cff" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#blue)"/>

  <!-- Legend -->
  <g transform="translate(40,470)">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#0e1116">Legend</text>
    <line x1="0" y1="18" x2="40" y2="18" stroke="#d29922" stroke-width="3"/>
    <text x="50" y="22" font-size="12" fill="#23324a">Audio/video media — always relayed via the server (never browser-to-browser)</text>
    <line x1="0" y1="40" x2="40" y2="40" stroke="#4f8cff" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="50" y="44" font-size="12" fill="#23324a">Signaling / chat / presence (Socket.IO) and REST</text>
  </g>

  <g transform="translate(40,545)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#0e1116">Roles &amp; access (enforced server-side)</text>
    <text x="0" y="20" font-size="11" fill="#23324a">Agent (JWT): create/end sessions · record · invite. Customer (scoped invite token): join one session only.</text>
    <text x="0" y="38" font-size="11" fill="#23324a">Admin (JWT): view all live + historical sessions, event logs, recordings · force-end any session.</text>
    <text x="0" y="62" font-size="11" fill="#5b6573">Stack: Node + TypeScript (tsx, no build) · Express · Socket.IO · werift · node:sqlite · prom-client · vanilla-JS client.</text>
  </g>
</svg>
